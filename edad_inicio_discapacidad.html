<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Edad de inicio de la discapacidad mental</title>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<style>
html, body {
    width:100%;
    height:100%;
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background:#ffffff;
}

#chart{
    width:100%;
    height:100%;
}
</style>
</head>

<body>

<div id="chart"></div>

<script>

const edades = [
"0–5",
"6–11",
"12–17",
"18–30",
"31–45",
"46–64",
"65+"
];

const valores = [
39598,
1536,
3286,
5973,
4433,
4531,
10339
];

const grupos = [
"Primera infancia",
"Infancia",
"Adolescencia",
"Adultez temprana",
"Adultez",
"Adultez media",
"Adulto mayor"
];

const trace = {

x: edades,
y: valores,

type: "scatter",
mode: "lines+markers",

line:{
color:"#4F81BD",
width:2
},

marker:{
size:10,
color:"#4F81BD",
line:{
color:"#1F4E79",
width:1
}
},

customdata: grupos,

hovertemplate:
"<b>%{customdata}</b><br>" +
"Edad inicio: %{x}<br>" +
"Cantidad: %{y:,}<extra></extra>"

};

const layout = {

title:{
text:"Edad de inicio de la discapacidad mental",
font:{
size:18,
color:"#1F4E79"
}
},

margin:{
l:60,
r:40,
t:60,
b:70
},

paper_bgcolor:"#ffffff",
plot_bgcolor:"#ffffff",

xaxis:{
title:"Edad inicio",
showgrid:true,
gridcolor:"#e5e5e5"
},

yaxis:{
title:"Q",
showgrid:true,
gridcolor:"#e5e5e5",
rangemode:"tozero"
},

showlegend:false

};

const config = {
responsive:true,
displayModeBar:false
};

Plotly.newPlot("chart",[trace],layout,config);

</script>

</body>
</html>
